<h2>Check-ins de Hoje</h2>

{% for c in checkins %}
    <div style="border:1px solid #ccc; padding:15px; margin-bottom:20px;">
        <h3>{{ c.manager.name }}</h3>

        {% for q in c.questions.all %}
            <p>
                <strong>{{ q.step }}</strong> —
                {{ q.status }} <br>
                {{ q.answer_text }}
            </p>
        {% endfor %}
    </div>
{% endfor %}
