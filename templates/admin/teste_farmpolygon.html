{% extends "admin/change_list.html" %}
{% load static %}

{% block extrahead %}
    {{ block.super }}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* barra de teste para confirmar que esse template carregou */
        .fp-template-loaded {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
        }

        /* melhora geral da listagem */
        #changelist {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px;
        }

        #changelist table thead th {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        #changelist table tbody tr {
            transition: all 0.18s ease;
        }

        #changelist table tbody tr:hover {
            background: #f8fbff !important;
        }

        #changelist table tbody td,
        #changelist table thead th {
            padding-top: 12px;
            padding-bottom: 12px;
        }

        .fp-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        .fp-preview-btn,
        .fp-kml-btn {
            border-radius: 999px !important;
            padding: 6px 14px !important;
            font-weight: 600 !important;
            border: 1px solid #dbe3ee !important;
            background: #fff !important;
            box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
            cursor: pointer;
        }

        .fp-preview-btn:hover,
        .fp-kml-btn:hover {
            background: #f8fafc !important;
            border-color: #cbd5e1 !important;
        }

        /* drawer lateral */
        .fp-drawer-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.28);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }

        .fp-drawer-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .fp-drawer {
            position: fixed;
            top: 16px;
            right: 16px;
            bottom: 16px;
            width: min(560px, calc(100vw - 32px));
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.25);
            z-index: 9999;
            transform: translateX(105%);
            transition: transform .28s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .fp-drawer.open {
            transform: translateX(0);
        }

        .fp-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .fp-drawer-title {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }

        .fp-drawer-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .fp-drawer-close {
            border: 0;
            background: rgba(15, 23, 42, 0.06);
            width: 38px;
            height: 38px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 18px;
        }

        .fp-drawer-body {
            padding: 18px 20px 20px;
            overflow: auto;
            display: grid;
            gap: 16px;
        }

        .fp-drawer-map {
            height: 360px;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.20);
            background: #e5e7eb;
        }

        .fp-info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .fp-info-card {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 18px;
            padding: 14px;
        }

        .fp-info-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: #64748b;
            margin-bottom: 6px;
        }

        .fp-info-value {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
        }

        .fp-observation {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 18px;
            padding: 14px;
            color: #334155;
            white-space: pre-wrap;
        }
    </style>
{% endblock %}

{% block content %}
    

    {{ block.super }}

    <div id="fpDrawerBackdrop" class="fp-drawer-backdrop"></div>

    <aside id="fpDrawer" class="fp-drawer" aria-hidden="true">
        <div class="fp-drawer-header">
            <div>
                <h3 id="fpDrawerTitle" class="fp-drawer-title">Preview</h3>
                <div id="fpDrawerSubtitle" class="fp-drawer-subtitle"></div>
            </div>
            <button type="button" id="fpDrawerClose" class="fp-drawer-close">✕</button>
        </div>

        <div class="fp-drawer-body">
            <div id="fpDrawerMap" class="fp-drawer-map"></div>

            <div class="fp-info-grid">
                <div class="fp-info-card">
                    <div class="fp-info-label">Área</div>
                    <div id="fpInfoArea" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Perímetro</div>
                    <div id="fpInfoPerimeter" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Qtd. pontos</div>
                    <div id="fpInfoPoints" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Modo</div>
                    <div id="fpInfoMode" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Fechado</div>
                    <div id="fpInfoClosed" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Status</div>
                    <div id="fpInfoActive" class="fp-info-value">-</div>
                </div>
            </div>

            <div id="fpObservationWrap" class="fp-observation" style="display:none;">
                <strong>Observação</strong>
                <div id="fpObservationText" style="margin-top:8px;"></div>
            </div>
        </div>
    </aside>

    <script>
        (function () {
            let drawerMap = null;
            let drawerLayerGroup = null;

            function formatArea(areaM2) {
                if (!areaM2) return "-";
                const ha = areaM2 / 10000;
                return `${ha.toFixed(2)} ha`;
            }

            function formatPerimeter(perimeterM) {
                if (!perimeterM) return "-";
                return `${Number(perimeterM).toFixed(2)} m`;
            }

            function normalizePoints(points) {
                if (!Array.isArray(points)) return [];

                return points
                    .map((p) => {
                        const lat = p.lat ?? p.latitude;
                        const lng = p.lng ?? p.longitude ?? p.lon;
                        if (lat == null || lng == null) return null;
                        return [Number(lat), Number(lng)];
                    })
                    .filter(Boolean);
            }

            function initSatelliteMap(el) {
                const map = L.map(el, {
                    zoomControl: true,
                    attributionControl: true,
                });

                L.tileLayer(
                    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
                    {
                        maxZoom: 19,
                        attribution: "Tiles © Esri",
                    }
                ).addTo(map);

                return map;
            }

            function drawPolygonOnMap(map, layerGroup, data) {
                const latlngs = normalizePoints(data.points);
                layerGroup.clearLayers();

                if (!latlngs.length) {
                    map.setView([-14.235, -51.9253], 4);
                    return;
                }

                if (data.is_closed && latlngs.length >= 3) {
                    const polygon = L.polygon(latlngs, {
                        color: "#2563eb",
                        weight: 2.5,
                        fillColor: "#3b82f6",
                        fillOpacity: 0.22,
                    }).addTo(layerGroup);

                    latlngs.forEach((latlng, index) => {
                        L.circleMarker(latlng, {
                            radius: 4,
                            color: "#0f172a",
                            weight: 1,
                            fillColor: "#ffffff",
                            fillOpacity: 1,
                        }).addTo(layerGroup).bindTooltip(`Ponto ${index + 1}`);
                    });

                    map.fitBounds(polygon.getBounds(), { padding: [24, 24] });
                } else {
                    const polyline = L.polyline(latlngs, {
                        color: "#2563eb",
                        weight: 3,
                    }).addTo(layerGroup);

                    latlngs.forEach((latlng, index) => {
                        L.circleMarker(latlng, {
                            radius: 4,
                            color: "#0f172a",
                            weight: 1,
                            fillColor: "#ffffff",
                            fillOpacity: 1,
                        }).addTo(layerGroup).bindTooltip(`Ponto ${index + 1}`);
                    });

                    map.fitBounds(polyline.getBounds(), { padding: [24, 24] });
                }
            }

            function openDrawer() {
                const drawer = document.getElementById("fpDrawer");
                const backdrop = document.getElementById("fpDrawerBackdrop");
                if (!drawer || !backdrop) return;

                drawer.classList.add("open");
                backdrop.classList.add("open");
                drawer.setAttribute("aria-hidden", "false");

                setTimeout(() => {
                    if (drawerMap) drawerMap.invalidateSize();
                }, 300);
            }

            function closeDrawer() {
                const drawer = document.getElementById("fpDrawer");
                const backdrop = document.getElementById("fpDrawerBackdrop");
                if (!drawer || !backdrop) return;

                drawer.classList.remove("open");
                backdrop.classList.remove("open");
                drawer.setAttribute("aria-hidden", "true");
            }

            function fillDrawerInfo(data) {
                const title = document.getElementById("fpDrawerTitle");
                const subtitle = document.getElementById("fpDrawerSubtitle");
                const area = document.getElementById("fpInfoArea");
                const perimeter = document.getElementById("fpInfoPerimeter");
                const points = document.getElementById("fpInfoPoints");
                const mode = document.getElementById("fpInfoMode");
                const closed = document.getElementById("fpInfoClosed");
                const active = document.getElementById("fpInfoActive");
                const obsWrap = document.getElementById("fpObservationWrap");
                const obsText = document.getElementById("fpObservationText");

                if (title) title.textContent = data.name || "Preview";
                if (subtitle) subtitle.textContent = data.farm_name || "Sem fazenda";
                if (area) area.textContent = formatArea(data.area_m2);
                if (perimeter) perimeter.textContent = formatPerimeter(data.perimeter_m);
                if (points) points.textContent = Array.isArray(data.points) ? data.points.length : "-";
                if (mode) mode.textContent = data.mode || "-";
                if (closed) closed.textContent = data.is_closed ? "Fechado" : "Aberto";
                if (active) active.textContent = data.is_active ? "Ativo" : "Inativo";

                if (data.observation) {
                    obsWrap.style.display = "block";
                    obsText.textContent = data.observation;
                } else {
                    obsWrap.style.display = "none";
                    obsText.textContent = "";
                }
            }

            async function handlePreviewClick(url) {
                try {
                    const response = await fetch(url, {
                        headers: {
                            "X-Requested-With": "XMLHttpRequest",
                        },
                    });

                    if (!response.ok) {
                        throw new Error("Falha ao carregar preview");
                    }

                    const data = await response.json();

                    fillDrawerInfo(data);

                    const mapEl = document.getElementById("fpDrawerMap");
                    if (!mapEl) return;

                    if (!drawerMap) {
                        drawerMap = initSatelliteMap(mapEl);
                        drawerLayerGroup = L.layerGroup().addTo(drawerMap);
                    }

                    drawPolygonOnMap(drawerMap, drawerLayerGroup, data);
                    openDrawer();
                } catch (error) {
                    console.error(error);
                    alert("Não foi possível carregar o preview do polígono.");
                }
            }

            document.addEventListener("click", function (event) {
                const previewBtn = event.target.closest(".fp-preview-btn");
                if (previewBtn) {
                    event.preventDefault();
                    const url = previewBtn.dataset.previewUrl;
                    if (url) {
                        handlePreviewClick(url);
                    } else {
                        alert("Botão sem data-preview-url.");
                    }
                }

                if (
                    event.target.id === "fpDrawerClose" ||
                    event.target.id === "fpDrawerBackdrop"
                ) {
                    closeDrawer();
                }
            });

            document.addEventListener("keydown", function (event) {
                if (event.key === "Escape") {
                    closeDrawer();
                }
            });

            console.log("farmpolygon template inline carregado");
        })();
    </script>
{% endblock %}
