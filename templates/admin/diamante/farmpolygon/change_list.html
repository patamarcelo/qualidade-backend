{% extends "admin/change_list.html" %}
{% load static %}

{% block extrahead %}
    {{ block.super }}

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .fp-drawer-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.28);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }

        .fp-drawer-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .fp-drawer {
            position: fixed;
            top: 16px;
            right: 16px;
            bottom: 16px;
            width: min(560px, calc(100vw - 32px));
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.25);
            z-index: 9999;
            transform: translateX(105%);
            transition: transform .28s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .fp-drawer.open {
            transform: translateX(0);
        }

        .fp-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .fp-drawer-title {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }

        .fp-drawer-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .fp-drawer-close {
            border: 0;
            background: rgba(15, 23, 42, 0.06);
            width: 38px;
            height: 38px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 18px;
        }

        .fp-drawer-body {
            padding: 18px 20px 20px;
            overflow: auto;
            display: grid;
            gap: 16px;
        }

        .fp-drawer-map {
            height: 360px;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.20);
        }

        .fp-info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .fp-info-card {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 18px;
            padding: 14px;
        }

        .fp-info-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: #64748b;
            margin-bottom: 6px;
        }

        .fp-info-value {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
        }

        .fp-observation {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 18px;
            padding: 14px;
            color: #334155;
            white-space: pre-wrap;
        }
    </style>
{% endblock %}

{% block content %}
    {{ block.super }}

    <div id="fpDrawerBackdrop" class="fp-drawer-backdrop"></div>

    <aside id="fpDrawer" class="fp-drawer" aria-hidden="true">
        <div class="fp-drawer-header">
            <div>
                <h3 id="fpDrawerTitle" class="fp-drawer-title">Preview</h3>
                <div id="fpDrawerSubtitle" class="fp-drawer-subtitle"></div>
            </div>
            <button type="button" id="fpDrawerClose" class="fp-drawer-close">✕</button>
        </div>

        <div class="fp-drawer-body">
            <div id="fpDrawerMap" class="fp-drawer-map"></div>

            <div class="fp-info-grid">
                <div class="fp-info-card">
                    <div class="fp-info-label">Área</div>
                    <div id="fpInfoArea" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Perímetro</div>
                    <div id="fpInfoPerimeter" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Qtd. pontos</div>
                    <div id="fpInfoPoints" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Modo</div>
                    <div id="fpInfoMode" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Fechamento</div>
                    <div id="fpInfoClosed" class="fp-info-value">-</div>
                </div>

                <div class="fp-info-card">
                    <div class="fp-info-label">Status</div>
                    <div id="fpInfoActive" class="fp-info-value">-</div>
                </div>
            </div>

            <div id="fpObservationWrap" class="fp-observation" style="display:none;">
                <strong>Observação</strong>
                <div id="fpObservationText" style="margin-top:8px;"></div>
            </div>
        </div>
    </aside>
{% endblock %}
